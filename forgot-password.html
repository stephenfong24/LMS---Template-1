<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - LUMINA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <div class="auth-wrapper">
        <div class="container">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Forgot Password?</h2>
                    <p class="text-muted small">Enter your email and we'll help you reset it.</p>
                </div>
                <form>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Email Address</label>
                        <input type="email" class="form-control" placeholder="name@example.com">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 mb-4">Send Reset Link</button>
                    <p class="text-center small text-muted mb-0"><a href="login.html" class="text-decoration-none fw-bold" style="color: #4f46e5;">Back to Sign In</a></p>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
