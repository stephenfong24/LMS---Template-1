<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LUMINA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <div class="auth-wrapper">
        <div class="container">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <div class="logo-box mx-auto mb-3"></div>
                    <h2 class="fw-bold">Sign In</h2>
                    <p class="text-muted small">Welcome back to Lumina</p>
                </div>
                <form>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Email Address</label>
                        <input type="email" class="form-control" placeholder="name@example.com">
                    </div>
                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label class="form-label small fw-bold mb-0">Password</label>
                            <a href="forgot-password.html" class="small text-decoration-none" style="color: #4f46e5;">Forgot?</a>
                        </div>
                        <input type="password" class="form-control" placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 mb-4">Sign In</button>
                    <p class="text-center small text-muted mb-0">Don't have an account? <a href="signup.html" class="text-decoration-none fw-bold" style="color: #4f46e5;">Join for free</a></p>
                </form>
            </div>
            <div class="text-center mt-4">
                <a href="index.html" class="text-muted text-decoration-none small">← Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
